---
apiVersion: v1
kind: Namespace
metadata:
  name: k8s-shell
  labels:
    # The dind sidecar needs securityContext.privileged: true, which the
    pod-security.kubernetes.io/enforce: privileged
    pod-security.kubernetes.io/audit: privileged
    pod-security.kubernetes.io/warn: privileged
spec: {}
status: {}
---

apiVersion: apps/v1
kind: Deployment
metadata:
  name: k8s-shell
  namespace: k8s-shell
  labels:
    app.kubernetes.io/name: k8s-shell
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: k8s-shell
  template:
    metadata:
      labels:
        app.kubernetes.io/name: k8s-shell
      annotations:
        # Pre-1.30 clusters enforce AppArmor via annotation; dockerd needs the
        # unconfined profile to do the mounts/namespacing DinD requires.
        container.apparmor.security.beta.kubernetes.io/dind: unconfined
    spec:
      serviceAccountName: k8s-shell-sa
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      initContainers:
        - name: seed-home
          image: ghcr.io/yogendra-avgo/k8s-shell:latest@sha256:03206edcbc0f4cad242204f8533a3506d435980084f719826338d623639f4089
          command: ["sh", "-c", "cp -a /home/shell/. /home-writable/"]
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: home
              mountPath: /home-writable
        - image: docker:27-dind
          args:
          - --config-file=/etc/docker/daemon.json
          env:
          - name: DOCKER_TLS_CERTDIR
            value: /certs
          imagePullPolicy: IfNotPresent
          name: dind
          resources:
            limits:
              cpu: "2"
              memory: 2Gi
            requests:
              cpu: 200m
              memory: 512Mi
          restartPolicy: Always
          securityContext:
            privileged: true
            # dockerd needs root even when privileged; overrides the pod-level
            # runAsNonRoot/runAsUser: 1000 that the other containers use.
            runAsNonRoot: false
            runAsUser: 0
            runAsGroup: 0
            seccompProfile:
              type: Unconfined
          startupProbe:
            exec:
              command:
              - docker
              - info
            failureThreshold: 60
            periodSeconds: 2
            successThreshold: 1
            timeoutSeconds: 1
          terminationMessagePath: /dev/termination-log
          terminationMessagePolicy: File
          volumeMounts:
          - mountPath: /certs
            name: docker-certs
          - mountPath: /var/lib/docker
            name: docker-lib
          - mountPath: /var/run
            name: docker-run
          - mountPath: /etc/docker/daemon.json
            name: dind-config
            subPath: daemon.json
      containers:
        - name: k8s-shell
          image: ghcr.io/yogendra-avgo/k8s-shell:latest@sha256:03206edcbc0f4cad242204f8533a3506d435980084f719826338d623639f4089
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          env:
            - name: DOCKER_HOST
              value: tcp://localhost:2376
            - name: DOCKER_TLS_VERIFY
              value: "1"
            - name: DOCKER_CERT_PATH
              value: /certs/client
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          volumeMounts:
            - name: docker-certs
              mountPath: /certs
              readOnly: true
            - name: home
              mountPath: /home/shell
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: home
          emptyDir: {}
        - name: tmp
          emptyDir: {}
        - emptyDir: {}
          name: docker-certs
        - emptyDir: {}
          name: docker-lib
        - emptyDir: {}
          name: docker-run
        - emptyDir: {}
          name: runner-data
        - configMap:
            defaultMode: 420
            name: ks8-shell-dind
          name: dind-config

---

apiVersion: v1
data:
  daemon.json: |
    {
      "default-address-pools": [
        {"base": "10.99.0.0/16", "size": 24}
      ]
    }
kind: ConfigMap
metadata:
  name: ks8-shell-dind
  namespace: k8s-shell
